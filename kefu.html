<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>线上心理咨询 - 乡心守护，数智同行</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        body {
            background: #fdf6f6;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .title {
            text-align: center;
            font-size: 24px;
            color: #c72c41;
            margin-bottom: 20px;
        }

        .video-box {
            width: 100%;
            height: 400px;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 15px;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .controls button {
            padding: 10px 20px;
            background: #c72c41;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
        }

        .chat {
            background: #fff;
            border-radius: 12px;
            height: 350px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-body {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
        }

        .chat-input {
            display: flex;
            border-top: 1px solid #eee;
        }

        .chat-input input {
            flex: 1;
            border: none;
            padding: 15px;
            outline: none;
            font-size: 14px;
        }

        .chat-input button {
            background: #c72c41;
            color: white;
            border: none;
            padding: 0 20px;
            cursor: pointer;
        }

        .msg {
            margin: 8px 0;
            padding: 8px 12px;
            border-radius: 10px;
            max-width: 75%;
            font-size: 14px;
        }

        .user {
            background: #fce4e4;
            margin-left: auto;
            text-align: right;
        }

        .counselor {
            background: #f5f5f5;
            margin-right: auto;
        }
    </style>
</head>

<body>

<div class="container">
    <h2 class="title">乡心守护 · 线上心理咨询室</h2>

    <div class="video-box">
        <video id="localVideo" autoplay muted></video>
    </div>

    <div class="controls">
        <button onclick="startVideo()">开启视频</button>
        <button onclick="startAudio()">语音通话</button>
        <button onclick="stopMedia()">关闭音视频</button>
    </div>

    <div class="chat">
        <div class="chat-body" id="chatBody"></div>
        <div class="chat-input">
            <input type="text" id="msgInput" placeholder="请输入咨询内容...">
            <button onclick="sendMsg()">发送</button>
        </div>
    </div>
</div>

<script>
    let localStream = null;
    const video = document.getElementById('localVideo');

    // 开启视频+语音
    function startVideo() {
        navigator.mediaDevices.getUserMedia({ video: true, audio: true })
            .then(stream => {
                localStream = stream;
                video.srcObject = stream;
            })
            .catch(e => {
                alert("请允许摄像头和麦克风权限");
            });
    }

    // 仅语音
    function startAudio() {
        navigator.mediaDevices.getUserMedia({ audio: true })
            .then(stream => {
                localStream = stream;
                video.srcObject = stream;
            })
            .catch(e => {
                alert("请允许麦克风权限");
            });
    }

    // 关闭音视频
    function stopMedia() {
        if (localStream) {
            localStream.getTracks().forEach(track => track.stop());
            localStream = null;
        }
        video.srcObject = null;
    }

    // 发送消息
    function sendMsg() {
        const input = document.getElementById('msgInput');
        const text = input.value.trim();
        if (!text) return;

        addMessage(text, 'user');
        input.value = '';

        // 模拟咨询师回复
        setTimeout(() => {
            addMessage("你好，我是心理咨询师，有什么可以帮助你的吗？", 'counselor');
        }, 800);
    }

    function addMessage(text, role) {
        const body = document.getElementById('chatBody');
        const div = document.createElement('div');
        div.className = 'msg ' + role;
        div.innerText = text;
        body.appendChild(div);
        body.scrollTop = body.scrollHeight;
    }

    // 回车发送
    document.getElementById('msgInput').addEventListener('keydown', function (e) {
        if (e.key === 'Enter') sendMsg();
    });
</script>

</body>
</html>
